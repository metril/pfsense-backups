# Production overlay: pin services to published GHCR images.
# Usage:
#   docker compose -f compose.yaml -f compose.prod.yaml pull
#   docker compose -f compose.yaml -f compose.prod.yaml up -d
#
# Override the image tag by setting IMAGE_TAG (e.g., IMAGE_TAG=v0.1.0).

services:
  worker:
    image: ghcr.io/metril/pfsense-backup-worker:${IMAGE_TAG:-latest}
    pull_policy: always

  web:
    image: ghcr.io/metril/pfsense-backup-web:${IMAGE_TAG:-latest}
    pull_policy: always
