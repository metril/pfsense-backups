services:
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: pfsense-backups-worker
    restart: unless-stopped

    environment:
      # Optional: set to a human-readable name if you want notifications to
      # include a "Host: …" line. Otherwise leave unset and the line is omitted.
      PFSENSE_BACKUPS_HOSTNAME: ${PFSENSE_BACKUPS_HOSTNAME:-}
      TZ: ${TZ:-UTC}
      APP_DB_URL: sqlite:////app/data/app.db
      PFSENSE_BACKUPS_SECRET_KEY_FILE: /app/data/secret.key
      BACKUPS_DIR: /backups
      METRICS_PORT: "8000"
      ZMQ_PULL_BIND: tcp://0.0.0.0:5555
      ZMQ_PUB_BIND: tcp://0.0.0.0:5556
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HEARTBEAT_SECONDS: "5"

    volumes:
      - ./data:/app/data
      - /mnt/usb-hdd-mirror/backups/pfsense:/backups

    networks:
      - internal

    # Prometheus scraping. ZMQ ports (5555/5556) stay on the internal network only.
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: pfsense-backups-web
    restart: unless-stopped
    depends_on:
      - worker

    environment:
      TZ: ${TZ:-UTC}
      APP_DB_URL: sqlite:////app/data/app.db
      PFSENSE_BACKUPS_SECRET_KEY_FILE: /app/data/secret.key
      BACKUPS_DIR: /backups
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WEB_PORT: "8080"

      SESSION_SECRET: ${SESSION_SECRET}
      OIDC_ISSUER: ${OIDC_ISSUER}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL}
      OIDC_ALLOWED_EMAILS: ${OIDC_ALLOWED_EMAILS}

      WORKER_PUSH_URL: tcp://worker:5555
      WORKER_SUB_URL: tcp://worker:5556

      # v0.20.0 — ProxyHeadersMiddleware defaults to loopback-only so
      # bare deployments aren't open to ``X-Forwarded-*`` spoofing from
      # arbitrary upstreams. This compose topology runs the app behind
      # Traefik on a Docker bridge network; the connecting address
      # uvicorn sees is the bridge gateway (172.x), which is outside
      # the default list. The default value ``*`` trusts anything on
      # the bridge so ``request.client.host`` reflects the real
      # client and audit logs stay useful.
      #
      # v0.33.0 — this is now overridable via ``.env`` for operators
      # who expose the container port directly (no Traefik). Set
      # ``TRUSTED_PROXIES=127.0.0.1,::1`` (or the specific proxy IP)
      # in ``.env`` to disable wildcard trust. Leaving it at ``*``
      # when bypassing the proxy makes ``X-Forwarded-For`` spoofable
      # by any client that can reach the port.
      TRUSTED_PROXIES: "${TRUSTED_PROXIES:-*}"

    volumes:
      # Shared DB + Fernet key with the worker.
      - ./data:/app/data
      # Read-only backup store: web serves files for download/diff.
      - /mnt/usb-hdd-mirror/backups/pfsense:/backups:ro

    networks:
      - internal
      - traefik

    labels:
      traefik.enable: "true"
      traefik.docker.network: "traefik"
      traefik.http.routers.pfsense-backups.rule: "Host(`${WEB_HOST:-pfsense-backups.olympos.net}`)"
      traefik.http.routers.pfsense-backups.entrypoints: "websecure"
      traefik.http.routers.pfsense-backups.tls: "true"
      traefik.http.services.pfsense-backups.loadbalancer.server.port: "8080"

networks:
  internal:
    driver: bridge
  traefik:
    external: true
