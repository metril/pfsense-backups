services:
  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: pfsense-backup-worker
    restart: unless-stopped

    environment:
      HOSTNAME: ${HOSTNAME:-Ouranos}
      TZ: ${TZ:-UTC}
      APP_DB_URL: sqlite:////app/data/app.db
      PFSENSE_BACKUP_SECRET_KEY_FILE: /app/data/secret.key
      BACKUPS_DIR: /backups
      METRICS_PORT: "8000"
      ZMQ_PULL_BIND: tcp://0.0.0.0:5555
      ZMQ_PUB_BIND: tcp://0.0.0.0:5556
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      HEARTBEAT_SECONDS: "5"

    volumes:
      # App state: SQLite DB + Fernet key. Back up this directory off-site.
      - ./data:/app/data
      # pfSense backup XMLs.
      - /mnt/usb-hdd-mirror/backups/pfsense:/backups

    networks:
      - internal

    # Prometheus scraping. Internal ZMQ ports (5555/5556) are not exposed to the host.
    ports:
      - "8000:8000"

    # Web service will share the `internal` network when added in Phase 2.
    # Worker is reachable from the web service at hostnames: worker:5555, worker:5556.

networks:
  internal:
    driver: bridge
