[alembic]
# Path to migration scripts, relative to this file.
script_location = alembic

# Make the repo root importable so env.py can `from pfsense_shared.models import Base`.
prepend_sys_path = .

# SQLAlchemy URL is set dynamically from APP_DB_URL in alembic/env.py.
sqlalchemy.url = sqlite:///./data/app.db

# File-naming template for new revisions.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Use batch mode for SQLite (rewrites tables for ALTER COLUMN).
# Set in env.py via render_as_batch=True.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
