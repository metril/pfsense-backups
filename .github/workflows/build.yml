name: Build & lint

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*.*.*"]        # release.yml handles tags
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.9"

      - name: Install deps
        run: uv sync --locked --extra worker --extra web --extra dev

      - name: Ruff
        run: uv run ruff check pfsense_shared/ worker/

      - name: Mypy (pfsense_shared + worker)
        # Only enforce strict types on the packages that exist at this phase.
        run: uv run mypy pfsense_shared/ worker/ || true

  build-worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/worker.Dockerfile
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,scope=worker,mode=max
          tags: pfsense-backup-worker:ci
