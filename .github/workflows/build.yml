name: Build & lint

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*.*.*"]        # release.yml handles tags
  pull_request:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.9"

      - name: Install deps
        run: uv sync --locked --extra worker --extra web --extra dev

      - name: Ruff
        run: uv run ruff check pfsense_shared/ worker/ web/

      - name: Mypy
        run: uv run mypy pfsense_shared/ worker/ web/ || true

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: ESLint
        run: npm run lint

      - name: Production build
        run: npm run build

  build-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: worker
            dockerfile: docker/worker.Dockerfile
          - name: web
            dockerfile: docker/web.Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.component.name }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component.dockerfile }}
          push: false
          cache-from: type=gha,scope=${{ matrix.component.name }}
          cache-to: type=gha,scope=${{ matrix.component.name }},mode=max
          tags: pfsense-backups-${{ matrix.component.name }}:ci
